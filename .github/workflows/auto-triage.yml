name: 🏷️ — Auto-triage

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  triage:
    name: '🏷️ — Assign and label'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 'Auto-assign author'
        if: ${{ !endsWith(github.actor, '[bot]') }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const number = context.payload.issue?.number
              ?? context.payload.pull_request?.number;
            if (!number) return;
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              assignees: [context.actor],
            });

      - name: 'Auto-label from triage section'
        if: github.event_name == 'pull_request' || github.event.pull_request != null
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            if (pr.user?.login?.endsWith('[bot]')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['chore'],
              });
              return;
            }

            const body = context.payload.pull_request?.body ?? '';
            const triage = body.match(/<!--triage-start-->([\s\S]*?)<!--triage-end-->/)?.[1] ?? '';
            const match = triage.match(/\|\s*Label\s*\|\s*(bug|enhancement|refactor|docs|infra|chore)\s*\|/i);
            if (!match) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [match[1].toLowerCase()],
            });

  project-fields:
    name: '📋 — Populate project fields'
    runs-on: ubuntu-latest
    needs: triage
    permissions: {}

    steps:
      - name: 'Add to project and set fields'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          github-token: ${{ secrets.ORG_PROJECT_PAT }}
          script: |
            const AI_TALENT_SEARCH_PROJECT_NUMBER = 4;
            const nodeId = context.payload.pull_request?.node_id
              ?? context.payload.issue?.node_id;
            if (!nodeId) return;

            const isBot = (context.payload.pull_request?.user?.login ?? context.payload.issue?.user?.login ?? '').endsWith('[bot]');

            const { organization: { projectV2 } } = await github.graphql(`
              query($login: String!, $number: Int!) {
                organization(login: $login) {
                  projectV2(number: $number) {
                    id
                    field(name: "Sprint") {
                      ... on ProjectV2IterationField {
                        configuration {
                          iterations { id title startDate duration }
                        }
                      }
                    }
                  }
                }
              }`, { login: context.repo.owner, number: AI_TALENT_SEARCH_PROJECT_NUMBER });

            const projectId = projectV2?.id;
            if (!projectId) {
              core.warning(`Project number ${AI_TALENT_SEARCH_PROJECT_NUMBER} was not found for ${context.repo.owner}; skipping project field population.`);
              return;
            }

            let itemId;
            try {
              const { addProjectV2ItemById: { item } } = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item { id }
                  }
                }`, { projectId, contentId: nodeId });
              itemId = item.id;
            } catch (error) {
              const isNotFound = Array.isArray(error?.errors) && error.errors.some((entry) => entry?.type === 'NOT_FOUND');
              if (!isNotFound) throw error;
              core.warning(`Project node '${projectId}' is not accessible for this token; skipping project field population.`);
              return;
            }

            const today = new Date().toISOString().split('T')[0];
            const body = context.payload.pull_request?.body ?? context.payload.issue?.body ?? '';
            const triage = body.match(/<!--triage-start-->([\s\S]*?)<!--triage-end-->/)?.[1] ?? '';

            const priorityMatch = triage.match(/\|\s*Priority\s*\|\s*(P[012])\s*\|/i);
            const sizeMatch = triage.match(/\|\s*Size\s*\|\s*(XS|S|M|L|XL)\s*\|/i);

            const priorityOptionMap = { P0: '79628723', P1: '0a877460', P2: 'da944a9c' };
            const sizeOptionMap = { XS: '6c6483d2', S: 'f784b110', M: '7515a9f1', L: '817d0097', XL: 'db339eb2' };

            const setField = async (fieldId, value) => {
              try {
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                    }) { projectV2Item { id } }
                  }`, { projectId, itemId, fieldId, value });
              } catch (error) {
                const isNotFound = Array.isArray(error?.errors) && error.errors.some((entry) => entry?.type === 'NOT_FOUND');
                if (!isNotFound) throw error;
                core.warning(`Skipping field update for '${fieldId}' because the field is not available in this project.`);
              }
            };

            const iterations = projectV2?.field?.configuration?.iterations ?? [];
            const todayDate = new Date(today);
            const activeSprint = iterations.find(it => {
              const start = new Date(it.startDate);
              const end = new Date(start);
              end.setDate(end.getDate() + it.duration);
              return todayDate >= start && todayDate < end;
            });

            await setField('PVTF_lADOAJbFRc4BQpOkzg-tENY', { number: 1 });
            await setField('PVTF_lADOAJbFRc4BQpOkzg-tENc', { date: today });
            await setField('PVTF_lADOAJbFRc4BQpOkzg-tENg', { date: today });
            if (activeSprint) {
              await setField('PVTIF_lADOAJbFRc4BQpOkzg_v0m8', { iterationId: activeSprint.id });
            }
            if (isBot) {
              await setField('PVTSSF_lADOAJbFRc4BQpOkzg-tENQ', { singleSelectOptionId: priorityOptionMap.P2 });
              await setField('PVTSSF_lADOAJbFRc4BQpOkzg-tENU', { singleSelectOptionId: sizeOptionMap.XS });
            } else {
              if (priorityMatch) {
                const optionId = priorityOptionMap[priorityMatch[1].toUpperCase()];
                if (optionId) await setField('PVTSSF_lADOAJbFRc4BQpOkzg-tENQ', { singleSelectOptionId: optionId });
              }
              if (sizeMatch) {
                const optionId = sizeOptionMap[sizeMatch[1].toUpperCase()];
                if (optionId) await setField('PVTSSF_lADOAJbFRc4BQpOkzg-tENU', { singleSelectOptionId: optionId });
              }
            }
